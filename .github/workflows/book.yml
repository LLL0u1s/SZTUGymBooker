name: SZTU Gym Booker

on:
  workflow_dispatch:
    inputs:
      venue_id:
        description: '场馆'
        required: true
        type: choice
        default: '4'
        options:
          - label: '游泳馆'
            value: '1'
          - label: '乒乓球'
            value: '2'
          - label: '羽毛球'
            value: '3'
          - label: '健身房'
            value: '4'
          - label: '足球场'
            value: '5'
          - label: '综合馆'
            value: '41'
          - label: '网球'
            value: '42'
          - label: '体能中心'
            value: '46'
          - label: '匹克球'
            value: '47'
      site_date_type:
        description: '日期'
        required: true
        type: choice
        default: '2'
        options:
          - label: '今天'
            value: '1'
          - label: '明天'
            value: '2'
      target_start_time:
        description: '目标时段'
        required: true
        type: choice
        default: '17:30:00'
        options:
          - '08:30:00'
          - '10:15:00'
          - '14:00:00'
          - '16:00:00'
          - '17:30:00'
          - '19:00:00'
          - '20:20:00'
      mode:
        description: '抢票模式'
        required: true
        type: choice
        default: 'parallel'
        options:
          - label: '串行 (每轮 1 个请求)'
            value: 'serial'
          - label: '并行 (每轮 N 个请求)'
            value: 'parallel'
      concurrency:
        description: '并发数（仅并行模式生效）'
        type: string
        default: '5'
      max_retries:
        description: '最大重试次数'
        type: string
        default: '180'

jobs:
  book:
    # 仅允许仓库所有者手动触发，防止陌生人随意执行
    if: |
      github.actor == github.repository_owner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Prepare config
        # config.toml is gitignored; copy from example only if not present
        # (allows users to commit their own config.toml in a fork if desired)
        run: test -f config.toml || cp config.example.toml config.toml

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SZTU Gym Booker
        env:
          SZTU_USERNAME: ${{ secrets.SZTU_USERNAME }}
          SZTU_PASSWORD: ${{ secrets.SZTU_PASSWORD }}
          # Telegram 通知（可选，未配置则不发送）
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 飞书通知（可选，未配置则不发送）
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          # workflow_dispatch inputs → 环境变量
          SZTU_VENUE_ID: ${{ inputs.venue_id }}
          SZTU_SITE_DATE_TYPE: ${{ inputs.site_date_type }}
          SZTU_TARGET_START_TIME: ${{ inputs.target_start_time }}
          SZTU_MODE: ${{ inputs.mode }}
          SZTU_CONCURRENCY: ${{ inputs.concurrency }}
          SZTU_MAX_RETRIES: ${{ inputs.max_retries }}
        run: python SZTUGymBooker.py
