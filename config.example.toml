# ============================================================
#  SZTU 体育馆自动订票 配置文件
# ============================================================

# --- 统一身份认证 ---
[account]
username = "202612345678"
password = "123456"

# --- 订票参数 ---
[booking]
venue_id = 4            # 场馆: 1=游泳馆 2=乒乓球 3=羽毛球 4=健身房 5=足球场 41=综合馆 42=网球 46=体能中心 47=匹克球
block_type = 1          # 区块类型
site_date_type = 2      # 日期: 1=今天 2=明天
session_type = 0        # 场次: 0=全部 1=上午 2=下午 3=晚上
target_start_time = "17:30:00"  # 目标时段 (HH:MM:SS)

# --- 轮询策略 ---
poll_interval = 1       # 售罄轮询间隔 (秒)
retry_interval = 1      # 失败重试间隔 (秒)
max_retries = 100       # 最大重试次数 (0=无限)
mode = "serial"         # 抢票模式: "serial"(串行) | "parallel"(并行)
concurrency = 5       # 仅并行模式生效，并发请求数 (默认 5)

# --- Telegram 通知（可选）---
[telegram]
bot_token = ""          # Telegram Bot Token（从 @BotFather 获取）
chat_id = ""            # 接收通知的 Chat ID（私聊 / 群组 / 频道）

# --- 飞书通知（可选）---
[feishu]
webhook_url = ""        # 飞书机器人 Webhook URL
